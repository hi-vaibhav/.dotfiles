"$schema" = 'https://starship.rs/config-schema.json'

format = """
$os\
$directory\
$git_branch\
$git_status\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
$docker_context\
$cmd_duration\
\n$username\
$character"""

add_newline = false
command_timeout = 2000

[time]
disabled = false
time_format = "%R"
style = "bg:peach"
format = '[[­ƒòÑ $time](bold cyan)]($style)'

[cmd_duration]
min_time = 500
format = '[ Ôåò](bold cyan) [$duration](bold cyan)'

[username]
show_always = true
style_user = 'bold cyan'
style_root = 'bold red'
format = '[$user ]($style)'

[directory]
style ='bold purple'
read_only='­ƒöÆ'
read_only_style='red'
format= '[$path]($style)[$read_only]($read_only_style)'
truncation_length = 1
truncation_symbol = '~/'
truncate_to_repo = false

[directory.substitutions]
